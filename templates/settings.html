{% extends "base.html" %}

{% block title %}Router Settings - Karte RouterOS Management System{% endblock %}

{% block content %}
<section class="page-heading">
    <h1>Router Settings</h1>
</section>

<form method="post" class="simple-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label" for="name">Router name</label>
            <input class="form-control form-control-lg" id="name" name="name" value="{{ settings.name }}" placeholder="Home Router" required>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="router_ip">Router IP address</label>
            <input class="form-control form-control-lg" id="router_ip" name="router_ip" value="{{ settings.router_ip }}" placeholder="192.168.88.1" required>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="api_port">API port</label>
            <input class="form-control form-control-lg" id="api_port" name="api_port" value="{{ settings.api_port }}" inputmode="numeric" required>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="router_username">MikroTik username</label>
            <input class="form-control form-control-lg" id="router_username" name="router_username" value="{{ settings.router_username }}" autocomplete="off" required>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="router_password">MikroTik password</label>
            <input class="form-control form-control-lg" id="router_password" name="router_password" type="password" autocomplete="new-password" placeholder="Leave blank to keep current password">
        </div>
    </div>

    <div class="form-actions">
        <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('discover_settings') }}">Find RouterBOARD</a>
        <button class="btn btn-primary btn-lg" name="action" value="save" type="submit">Save Settings</button>
        <button class="btn btn-outline-primary btn-lg" name="action" value="test" type="submit">Save and Test</button>
    </div>
</form>
{% endblock %}
