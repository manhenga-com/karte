{% extends "base.html" %}

{% block title %}Create Account - Karte RouterOS Management System{% endblock %}

{% block content %}
<section class="auth-layout">
    <aside class="auth-hero">
        <img class="auth-logo" src="{{ url_for('static', filename='mikrotik-logo.svg') }}" alt="MikroTik">
        <p class="auth-product">Karte RouterOS</p>
        <h1>Management System</h1>
        <div class="auth-tiles" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </aside>

    <section class="auth-card" aria-labelledby="account-register-title">
        <p class="auth-kicker">Account</p>
        <h1 id="account-register-title">Create account</h1>
        <p class="auth-note">Free trial includes 1 router for 30 days.</p>

        <form method="post" class="auth-form">
            <div class="auth-field">
                <label class="form-label" for="name">Name</label>
                <input class="form-control" id="name" name="name" value="{{ name }}" autocomplete="name" required autofocus>
            </div>
            <div class="auth-field">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" value="{{ email }}" autocomplete="username" required>
            </div>
            <div class="auth-field">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
            </div>

            <button class="btn btn-primary auth-primary" type="submit">Create account</button>
        </form>

        <div class="auth-footer-link">
            <span>Already have an account?</span>
            <a href="{{ url_for('account_login') }}">Sign in</a>
        </div>
    </section>
</section>
{% endblock %}
