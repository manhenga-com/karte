<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0073e6">
    <title>Administrator Setup - Karte</title>
    <link rel="icon" href="{{ url_for('static', filename='icon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="auth-body">
    <main class="auth-shell">
        <section class="auth-card" aria-labelledby="setup-title">
            <img class="auth-app-icon" src="{{ url_for('static', filename='icon.svg') }}" alt="" width="48" height="48">
            <p class="auth-product">Karte RouterOS</p>
            <h1 id="setup-title">Create administrator</h1>
            <p class="auth-note">This page closes after the first local account is created.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                {% endfor %}
            {% endwith %}

            <form method="post" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="auth-field">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control" id="username" name="username" value="{{ user.username }}" autocomplete="username" required autofocus>
                </div>
                <div class="auth-field">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" id="password" name="password" type="password" minlength="10" autocomplete="new-password" required>
                </div>
                <button class="btn btn-primary auth-primary" type="submit">Create administrator</button>
            </form>
        </section>
    </main>
</body>
</html>
